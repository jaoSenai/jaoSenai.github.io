<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        
        h1 {
            text-align: left;
        }
        
        h2 {
            text-align: center;
            margin-top: 30px;
        }
        
        form {
            max-width: 500px;
            margin: auto;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #333;
        }
        
        label {
            display: block;
            margin-top: 10px;
        }
        
        input,
        textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 7px;
            border: 1px solid #ccc;
        }
        
        input::placeholder {
            color: black;
        }
        
        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background-color: #0b8de9;
            color: white;
            border: none;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #000000;
        }
    </style>
</head>

<body>

    <h1>Informações Pessoais</h1>

    <h2>Cadastro de Cliente</h2>



    <form>
        <label>Nome:</label>
        <input type="text" placeholder="Digite o nome do cliente">

        <label>Idade:</label>
        <input type="number" placeholder="Digite a idade">

        <label>Endereço:</label>
        <input type="text " placeholder="Digite o endereço">

        <label>Cidade:</label>
        <input type="text" placeholder="Digite a cidade">

        <label>Estado:</label>
        <input type="text" placeholder="UF">

        <label>CEP:</label>
        <input type="text" placeholder="XXXXX-XXX">

        <label>Tel/Res:</label>
        <input type="text" placeholder="99 99999-9999">

        <label>Tel/Cel:</label>
        <input type="text" placeholder="99 99999-9999">

        <label>Email:</label>
        <input type="email" placeholder="Digite o email">

        <button type="submit">Enviar</button>
    </form>

</body>

</html>
